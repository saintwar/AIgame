<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>宝岛钓手 · 水社村 [720p HD]</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'TencentSansW7', 'Cubic 11', 'Noto Sans TC', monospace;
      overflow: hidden;
    }
    #game-root {
      width: 1280px;
      height: 720px;
      position: relative;
      background: #000;
      box-shadow: 0 0 60px rgba(0,0,0,0.9);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    @media (max-width: 1320px), (max-height: 760px) {
      #game-root {
        transform: scale(min(calc(100vw / 1280), calc(100vh / 720)));
        transform-origin: center center;
      }
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      width: 100%;
      height: 100%;
    }
    #transition-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms cubic-bezier(0.4, 0.0, 0.2, 1);
      z-index: 999;
    }
    #debug-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 16px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-size: 10px;
      line-height: 16px;
      padding: 0 8px;
      font-family: monospace;
      display: none;
      z-index: 998;
    }
  </style>
</head>
<body>
  <div id="game-root">
    <div id="village-scene" style="width:100%;height:100%;display:none"></div>
    <div id="fishing-scene" style="width:100%;height:100%;display:none"></div>
    <div id="debug-bar">DEBUG MODE</div>
    <div id="transition-overlay"></div>
  </div>
  <script>
    // 强制清除 ES 模块缓存（开发模式）
    const cacheBust = '?v=' + Date.now();
    const script = document.createElement('script');
    script.type = 'module';
    script.src = 'js/main.js' + cacheBust;
    document.body.appendChild(script);
  </script>
</body>
</html>
