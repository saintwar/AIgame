<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>宝岛钓手 · 水社村 [720p HD]</title>
  <!-- PHASE 16-1：腾讯云 CloudBase JS SDK（排行榜功能依赖）
       ⚠️ 任务规格里写的 tcbjs/2.6.5/tcb.js 在 imgcache CDN 上已下架（实测 404），
          改用官方现行包 @cloudbase/js-sdk 在 imgcache 镜像上的最高稳定版 1.6.0，
          全局变量名为 cloudbase（不是 tcb），见 js/cloudbase.js 适配 -->
  <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/1.6.0/cloudbase.full.js"></script>
  <!-- 内联 SVG favicon：像素小鱼（避免根目录 favicon.ico 0 字节导致的 404） -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'><rect width='16' height='16' fill='%231a3a5c'/><path fill='%23e76f51' d='M3 7h1v1H3zm1 0h1v1H4zm1-1h1v1H5zm1 0h1v1H6zm1 0h1v1H7zm1 0h1v1H8zm1 0h1v1H9zm1 1h1v1h-1zM5 8h1v1H5zm1 0h1v1H6zm1 0h1v1H7zm1 0h1v1H8zm1 0h1v1H9zM4 8h1v1H4zm0 1h1v1H4zm1-1h1v1H5zm1 1h1v1H6zm1 0h1v1H7zm1 0h1v1H8zm1 0h1v1H9zm1 0h1v1h-1zm1-2h1v1h-1zm0 2h1v1h-1zm0 1h1v1h-1zm0-2h1v1h-1z'/><rect x='9' y='6' width='1' height='1' fill='%23ffffff'/></svg>">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'TencentSansW7', 'Cubic 11', 'Noto Sans TC', monospace;
      overflow: hidden;
    }
    #game-root {
      width: 1280px;
      height: 720px;
      position: relative;
      background: #000;
      box-shadow: 0 0 60px rgba(0,0,0,0.9);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    @media (max-width: 1320px), (max-height: 760px) {
      #game-root {
        transform: scale(min(calc(100vw / 1280), calc(100vh / 720)));
        transform-origin: center center;
      }
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      width: 100%;
      height: 100%;
    }
    #transition-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms cubic-bezier(0.4, 0.0, 0.2, 1);
      z-index: 999;
    }
    #debug-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 16px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-size: 10px;
      line-height: 16px;
      padding: 0 8px;
      font-family: monospace;
      display: none;
      z-index: 998;
    }
  </style>
</head>
<body>
  <div id="game-root">
    <div id="village-scene" style="width:100%;height:100%;display:none"></div>
    <div id="fishing-scene" style="width:100%;height:100%;display:none"></div>
    <div id="debug-bar">DEBUG MODE</div>
    <div id="transition-overlay"></div>
  </div>
  <!-- PHASE 16-1：CloudBase 初始化（IIFE，必须在 main.js 之前加载） -->
  <script src="js/cloudbase.js"></script>
  <script>
    // 强制清除 ES 模块缓存（开发模式）
    const cacheBust = '?v=' + Date.now();
    const script = document.createElement('script');
    script.type = 'module';
    script.src = 'js/main.js' + cacheBust;
    document.body.appendChild(script);
  </script>
</body>
</html>
