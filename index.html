<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>宝岛钓手 · 水社村 [720p HD]</title>
  <!-- PHASE 16-7-PERF：字体子集化 + 预加载（替代 16-7-HOTFIX）
       问题：原 ttf 8.1MB 在 GitHub Pages 海外 CDN 不开 br/gzip，国内首屏卡 5~10s。
       对策：用 fontTools.pyftsubset 扫描全项目字符（约 1300 个），生成 woff2 子集
            体积从 8.1MB → 235KB（35倍压缩、节省 97.2%）。
       生成命令：python3 scripts/build-font-subset.py
       注意：
       1) preload 用 woff2，type="font/woff2"；如需更新，文件 hash 自带去重所以
          ?v=... 可省，但保留以便日后强刷
       2) crossorigin="anonymous" 必须有，否则 Chrome 会把 preload 视作不同凭据
          请求，重新拉一遍 -->
  <link rel="preload" href="font/TencentSans-W7.woff2?v=20260524" as="font" type="font/woff2" crossorigin="anonymous">
  <!-- PHASE 16-1 紧急补丁：升级 @cloudbase/js-sdk 到 2.x（修复 ACCESS_TOKEN_DISABLED）
       官方真实 CDN：static.cloudbase.net/cloudbase-js-sdk/<version>/cloudbase.full.js
       （来源：docs.cloudbase.net/api-reference/webv2/initialization，实测 200）
       注意：任务规格给的 web.sdk.qcloud.com 是错的（NoSuchKey）；
             imgcache CDN 上 2.x 全部 404；
             npm 包内无 UMD 全量包；
             只有 static.cloudbase.net 才托管 2.x UMD。
       版本：2.17.3（npm 当前稳定版，实测可达；规格里写的 2.13.1 在官方 CDN 上 404）
       全局变量名仍为 cloudbase（小写），见 js/cloudbase.js 适配
       PHASE 16-9：加 defer。SDK 体积 537KB，海外 CDN 下载需 1~3s，无 defer 时
                  会完全阻塞 HTML 解析，splash CSS / splash-loader.js 都会被卡。
                  defer 后下载与 HTML 解析并行，且执行顺序仍按 DOM 出现顺序，
                  保证后续 cloudbase.js 拿到 window.cloudbase 的时序不变。 -->
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js" defer></script>
  <!-- 内联 SVG favicon：像素小鱼（避免根目录 favicon.ico 0 字节导致的 404） -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'><rect width='16' height='16' fill='%231a3a5c'/><path fill='%23e76f51' d='M3 7h1v1H3zm1 0h1v1H4zm1-1h1v1H5zm1 0h1v1H6zm1 0h1v1H7zm1 0h1v1H8zm1 0h1v1H9zm1 1h1v1h-1zM5 8h1v1H5zm1 0h1v1H6zm1 0h1v1H7zm1 0h1v1H8zm1 0h1v1H9zM4 8h1v1H4zm0 1h1v1H4zm1-1h1v1H5zm1 1h1v1H6zm1 0h1v1H7zm1 0h1v1H8zm1 0h1v1H9zm1 0h1v1h-1zm1-2h1v1h-1zm0 2h1v1h-1zm0 1h1v1h-1zm0-2h1v1h-1z'/><rect x='9' y='6' width='1' height='1' fill='%23ffffff'/></svg>">
  <style>
    /* PHASE 16-7-PERF：全局字体 TencentSans-W7（已子集化为 woff2）
       - 仅 woff2（235KB），覆盖现代浏览器（Chrome 36+/Firefox 39+/Safari 12+ ≈ 99% 用户）
       - PHASE 16-9：移除 ttf 兜底（8.1MB，理论上不会触发）。
         理由：① 现代浏览器全部支持 woff2，ttf 路径只有 IE/极老 Safari 才会走；
              ② 文件 8.1MB 占用 git 仓库空间且 GH Pages 不开 br/gzip 时是潜在抖动源；
              ③ 留 ttf 让浏览器在 src 列表里多解析一项，无收益。
         极老浏览器降级到 font-family 列表的下一个（Noto Sans TC / 微软雅黑）即可。
       - font-display: swap 防止 FOIT 白屏；首屏先用兜底字体，字体加载完后无缝替换
       - family 名统一为 'TencentSans'（散点处的 'TencentSansW7' 已一并对齐到此名）
       - GitHub Pages 严格区分大小写，文件名必须完全一致 */
    @font-face {
      font-family: 'TencentSans';
      src: url('font/TencentSans-W7.woff2?v=20260524') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    /* 别名：保持 Canvas 内大量历史 ctx.font 'TencentSansW7' 字面量也能命中
       同一份 woff2 复用（浏览器会缓存），无额外网络请求；这样 fishing-scene.js
       的 ctx.fillText 不需要改动也能用上新字体（约束 4：不动 Canvas 内 ctx.fillText） */
    @font-face {
      font-family: 'TencentSansW7';
      src: url('font/TencentSans-W7.woff2?v=20260524') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'TencentSans', 'Noto Sans TC', 'PingFang TC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }
    #game-root {
      width: 1280px;
      height: 720px;
      position: relative;
      background: #000;
      box-shadow: 0 0 60px rgba(0,0,0,0.9);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    @media (max-width: 1320px), (max-height: 760px) {
      #game-root {
        transform: scale(min(calc(100vw / 1280), calc(100vh / 720)));
        transform-origin: center center;
      }
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      width: 100%;
      height: 100%;
    }
    #transition-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms cubic-bezier(0.4, 0.0, 0.2, 1);
      z-index: 999;
    }
    #debug-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 16px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-size: 10px;
      line-height: 16px;
      padding: 0 8px;
      font-family: monospace;
      display: none;
      z-index: 998;
    }
  </style>
  <!-- PHASE 16-8：启动 Loading 条样式
       必须在 splash-loader.js 之前加载，否则 splash DOM 创建时会有未样式化闪烁。
       该 CSS 体积极小（~1KB），与 @font-face 一同在 <head> 内并行下载。 -->
  <link rel="stylesheet" href="css/splash-loader.css">
</head>
<body>
  <!-- PHASE 16-8：启动 Loading 条（IIFE，必须在所有业务 script 之前加载）
       职责：覆盖首屏白屏 / 字体闪烁，事件驱动 4 阶段进度（字体 → CloudBase →
            玩家档案 → 场景就绪），5 秒兜底强制隐藏。
       零侵入：监听 cloudbase.js 已抛出的 'cloudbase:ready' / 'cloudbase:error' 事件
              + 轮询 PlayerProfile / SceneManager 既有字段，业务代码零改动。 -->
  <script src="js/ui/splash-loader.js"></script>
  <div id="game-root">
    <div id="village-scene" style="width:100%;height:100%;display:none"></div>
    <div id="fishing-scene" style="width:100%;height:100%;display:none"></div>
    <div id="debug-bar">DEBUG MODE</div>
    <div id="transition-overlay"></div>
  </div>
  <!-- PHASE 16-1：CloudBase 初始化（IIFE，必须在 main.js 之前加载）
       PHASE 16-9：加 defer，与上面 SDK 的 defer 配对——defer 脚本按 DOM 出现顺序
                  顺序执行，所以本文件一定在 cloudbase.full.js 之后跑，能拿到
                  window.cloudbase 全局。 -->
  <script src="js/cloudbase.js" defer></script>
  <!-- PHASE 16-2：玩家档案系统 + 昵称弹窗（IIFE，依赖 cloudbase.js，先于 main.js）
       PHASE 16-9：加 defer，链式延后到 cloudbase.js 之后执行。 -->
  <script src="js/profile-system.js" defer></script>
  <script src="js/ui/nickname-dialog.js" defer></script>
  <!-- PHASE 16-3：排行榜系统（IIFE，依赖 cloudbase.js + profile-system.js，先于 main.js） -->
  <script src="js/leaderboard-system.js" defer></script>
  <!-- PHASE 16-4：排行榜 UI 面板（IIFE，依赖 leaderboard-system.js，自带样式 + HUD 按钮） -->
  <script src="js/ui/leaderboard-panel.js" defer></script>
  <!-- PHASE 16-4.8 仗1-HOTFIX2：村庄场景鼠标点击寻路（IIFE，A* 已内嵌，零外部依赖）
       - 仅在 SceneManager.currentScene === 'village' 时响应
       - 钓鱼场景 / 登录页 / 标题画面 / 对话 / 任意 UI 面板 全部不响应（约束 2/3）
       - 4 处 hook 由 village-scene.js 内部主动调用（约束 6）
       - 注：原方案曾用 pathfinding@0.4.18 第三方库，但该 npm 包未发布 UMD bundle，
         切换到 jsdelivr-gh 的 release dist 后又发现 bundle 自身坏（browserify 0.x
         产物运行时报 "Cannot read properties of undefined (reading '4')"）。
         决策：209 格的网格无需第三方寻路库，60 行手写 A* 性能秒过，永不抖动。 -->
  <script src="js/click-to-move.js" defer></script>
  <!-- PHASE 16-9：main.js 改用 <script type="module" defer src="...">
       原本走 inline 注入 + ?v=Date.now() 的写法是历史调试遗留，
       后果：① ?v=Date.now() 让 main.js 永远不命中浏览器缓存，
             二次访问也得重拉整张 ES module 依赖图（43 个 JS）；
             ② inline 注入比静态 <script> 晚一个 task，瀑布更深。
       改用静态 <script type="module" defer>，固定版本号 ?v=20260524，
       浏览器二次访问直接命中 304/缓存，并且 module 默认就是 defer 行为，
       与上面所有 defer 脚本一并按 DOM 顺序在 DOMContentLoaded 前执行完。
       如需强刷，把 ?v=20260524 升一位（与字体一致的版本号语义）。 -->
  <script type="module" src="js/main.js?v=20260524" defer></script>
</body>
</html>
